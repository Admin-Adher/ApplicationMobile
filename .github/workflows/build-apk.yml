name: Build APK (Android)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL || 'https://jzeojdpgglbxjdasjgta.supabase.co' }}
  EXPO_PUBLIC_SUPABASE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_KEY || 'sb_publishable_82T9HBSLycSJ2T6OBaDNLA_01V1mXda' }}

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Force JS bundle embedding in APK
        run: |
          printf '\nbundleInDebug=true\nhermesEnabled=true\n' >> android/gradle.properties

      - name: Configure release signing with debug key
        working-directory: android
        run: |
          cat >> app/build.gradle << 'EOF'

          android.buildTypes.release.signingConfig = android.signingConfigs.debug
          EOF

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Find APK location
        run: find android/app/build/outputs/apk -name "*.apk" | tee apk-paths.txt

      - name: Stage APK with stable name
        run: |
          mkdir -p release-assets
          cp android/app/build/outputs/apk/release/*.apk release-assets/buildtrack-release.apk
          ls -lh release-assets/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: buildtrack-release.apk
          path: release-assets/buildtrack-release.apk
          retention-days: 30
          if-no-files-found: error

      - name: Publish APK as public GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-build-${{ github.run_number }}
          name: BuildTrack Android — Build ${{ github.run_number }}
          body: |
            Build Android automatique #${{ github.run_number }}
            Commit : ${{ github.sha }}

            Téléchargement direct (pointe toujours vers la dernière version) :
            https://github.com/${{ github.repository }}/releases/latest/download/buildtrack-release.apk
          files: release-assets/buildtrack-release.apk
          make_latest: 'true'
          prerelease: false
